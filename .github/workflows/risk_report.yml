name: Daily Risk Report

on:
  schedule:
    # Run at 9:15 PM UTC (5:15 PM EDT), weekdays only
    - cron: '15 21 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  risk_report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install kaleido

      - name: Run risk report
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python daily_risk_report.py

      - name: Commit updated data caches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rd2_fragility.parquet data/rd2_environment.json
          if git diff --cached --quiet; then
            echo "No fragility change to commit."
          else
            git commit -m "Detailed Update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            # This push races the 21:32 UTC CBOE commit. A bare push loses to a
            # non-fast-forward and silently strands rd2_fragility.parquet at
            # yesterday's values, which daily_scan reads to size every order.
            # Rebase, verify the push landed, and fail the job loudly if it did not.
            pushed=false
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              if git push; then pushed=true; break; fi
              echo "push attempt $attempt rejected; re-rebasing and retrying."
              sleep 5
            done
            if [ "$pushed" != true ]; then
              echo "::error::failed to push rd2_fragility.parquet after 3 attempts — live sizing would read stale fragility"
              exit 1
            fi
          fi
