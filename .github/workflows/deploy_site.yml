name: Deploy Private Site

# Builds the static private analytics site (full-history trade ledger ->
# client-side analytics app) and deploys it to Cloudflare Pages, behind
# Cloudflare Access. See docs/private_site_setup.md for the one-time
# Cloudflare configuration.
#
# Trigger: invoked as a REUSABLE WORKFLOW (workflow_call) from a dependent
# `deploy-site` job at the tail of daily_screener.yml (needs: run-scanner),
# so the rebuild runs in the SAME run as the scan and is guaranteed to start
# only after the scanner job succeeds. This replaces the old workflow_run
# chain, which is best-effort and was silently failing to fire — incompatible
# with the "must run after the scan" guarantee we need. Two scanner runs per
# trading day (AM dispatch + PM bookend) => two fresh rebuilds; a skipped or
# failed scan skips the deploy and the previous deploy stays up.
#
# workflow_dispatch is retained for manual / ad-hoc rebuilds.

concurrency:
  # Literal group (not ${{ github.workflow }}) so chained + manual deploys
  # serialize into the SAME queue regardless of how they were invoked — when
  # called via workflow_call, github.workflow resolves to the CALLER's name.
  group: deploy-private-site
  cancel-in-progress: false

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      full_chart_rebuild:
        description: "Re-render ALL signal charts (drop --skip-existing). One-time use after a chart-style change; normal runs stay incremental."
        type: boolean
        default: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull caches from R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python -c "from cache_io import download_to_local; \
            download_to_local('master_prices.parquet', 'data/master_prices.parquet'); \
            download_to_local('earnings_calendar.parquet', 'data/earnings_calendar.parquet'); \
            download_to_local('atr_seasonal_ranks.parquet', 'atr_seasonal_ranks.parquet'); \
            download_to_local('overflow_universe.parquet', 'data/overflow_universe.parquet'); \
            download_to_local('earnings_calendar_overflow.parquet', 'data/earnings_calendar_overflow.parquet')"

      - name: Build full-history trade ledger
        env:
          OVERFLOW_UNIVERSE_ACTIVE: "0"
        run: python scripts/build_trade_ledger.py

      - name: Render signal charts -> R2 (incremental, or full on dispatch flag; best effort)
        continue-on-error: true
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ "${{ github.event.inputs.full_chart_rebuild }}" = "true" ]; then
            echo "FULL chart rebuild: re-rendering ALL charts (no --skip-existing)"
            python scripts/build_signal_charts.py --all --upload
          else
            python scripts/build_signal_charts.py --all --upload --skip-existing
          fi

      - name: Build daily seasonal ideas (best effort)
        continue-on-error: true
        env:
          OVERFLOW_UNIVERSE_ACTIVE: "0"
        run: python daily_seasonal_ideas.py

      - name: Build risk summary JSON (best effort, always exits 0)
        run: python scripts/build_risk_json.py

      - name: Build site
        env:
          GCP_JSON: ${{ secrets.GCP_JSON }}
          OVERFLOW_UNIVERSE_ACTIVE: "0"
        run: python scripts/build_site.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # No positional dir: wrangler.toml sets pages_build_output_dir=dist
          # and binds the CHARTS R2 bucket for functions/chartimg/[[path]].js.
          # (wrangler.toml, not .jsonc: the action's wrangler 3.90.0 only reads
          #  pages_build_output_dir from .toml.)
          command: pages deploy --project-name=seasonals-mslade --branch=main
