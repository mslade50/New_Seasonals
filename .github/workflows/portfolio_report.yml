name: Daily Portfolio Report

# Generates the daily portfolio health report (12-month backtest of the
# full strategy book + open-positions snapshot). Sends an HTML email with
# chart attachment and writes the open positions to the Portfolio Google
# Sheets tab.
#
# Replaces the local Task Scheduler entry (run_daily_portfolio_report.ps1).

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    # 21:30 UTC = 5:30 PM ET — same slot as the legacy local task.
    # Runs AFTER update_master_prices (20:30 UTC) so it sees a parquet that
    # includes today's close, and BEFORE the post-close daily_screener
    # bookend (22:00 UTC). The backtest only reads through the prior trading
    # day so today's bar is informational only.
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy yfinance gspread google-auth boto3 streamlit plotly matplotlib kaleido

      - name: Pull caches from R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python -c "from cache_io import download_to_local; download_to_local('master_prices.parquet', 'data/master_prices.parquet'); download_to_local('earnings_calendar.parquet', 'data/earnings_calendar.parquet'); download_to_local('overflow_universe.parquet', 'data/overflow_universe.parquet'); download_to_local('earnings_calendar_overflow.parquet', 'data/earnings_calendar_overflow.parquet')"

      - name: Run portfolio report
        env:
          GCP_JSON: ${{ secrets.GCP_JSON }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          # Comprehensive overflow universe live (dynamic screen ∪ static tier).
          OVERFLOW_UNIVERSE_ACTIVE: "1"
        run: python daily_portfolio_report.py
