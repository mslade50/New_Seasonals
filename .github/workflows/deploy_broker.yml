name: Deploy Execution Broker

# One-time / on-demand deploy of the standalone execution-broker Worker + its
# Durable Object, plus wiring the Pages site to it. Separate from deploy_site.yml
# so a broker change can never break the live site. Heartbeat-only (Phase 2a) —
# no order logic in the broker.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install wrangler
        run: npm i -g wrangler@4

      - name: Deploy Worker + set its secrets
        working-directory: execution-broker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_BROKER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AGENT_TOKEN: ${{ secrets.AGENT_TOKEN }}
          STATUS_TOKEN: ${{ secrets.STATUS_TOKEN }}
        run: |
          wrangler deploy 2>&1 | tee deploy.log; rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then echo "wrangler deploy failed (rc=$rc)"; exit "$rc"; fi
          url=$(grep -oE 'https://[a-z0-9._-]+\.workers\.dev' deploy.log | head -1)
          if [ -z "$url" ]; then echo "::warning::no workers.dev URL parsed from deploy output"; fi
          echo "BROKER_URL=$url" >> "$GITHUB_ENV"
          printf '%s' "$AGENT_TOKEN"  | wrangler secret put AGENT_TOKEN
          printf '%s' "$STATUS_TOKEN" | wrangler secret put STATUS_TOKEN

      - name: Wire the Pages site (EXEC_BROKER_URL + STATUS_TOKEN)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_BROKER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STATUS_TOKEN: ${{ secrets.STATUS_TOKEN }}
        run: |
          set -e
          if [ -z "$BROKER_URL" ]; then echo "No broker URL; skipping Pages wiring."; exit 1; fi
          printf '%s' "$BROKER_URL"   | wrangler pages secret put EXEC_BROKER_URL --project-name seasonals-mslade
          printf '%s' "$STATUS_TOKEN" | wrangler pages secret put STATUS_TOKEN   --project-name seasonals-mslade
          echo "Broker URL = $BROKER_URL"
          echo "Agent should use: EXEC_BROKER_WS=${BROKER_URL/https:/wss:}/agent"

      - name: Summary
        run: |
          echo "### Execution broker deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "Broker URL: \`$BROKER_URL\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Agent WS:  \`${BROKER_URL/https:/wss:}/agent\`" >> "$GITHUB_STEP_SUMMARY"
