name: Update Master Prices

# Daily incremental update of master_prices.parquet (the canonical
# 2000-ticker, 25-yr price cache). Pulls fresh bars from yfinance,
# appends to the cache pulled from R2, writes back to R2.
#
# Replaces the local Task Scheduler entry (run_master_prices_update.ps1)
# once R2 is configured.

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    # 20:30 UTC = 4:30 PM ET — 30 min after close. Lands BEFORE the post-close
    # daily_screener bookend at 22:00 UTC so overflow sees Friday's actual
    # close instead of Thursday's stale bar.
    - cron: '30 20 * * 1-5'
    # AM fallback: 9:30 UTC (5:30 AM EDT / 4:30 AM EST). Only runs if the
    # local workflow_dispatch at 4:17 AM ET didn't fire today. The `check`
    # job below skips it when a successful workflow_dispatch already
    # happened today UTC.
    - cron: '30 9 * * 1-5'

  # Pre-market refresh (4:17 AM ET weekdays, 30 min before daily_screener AM
  # dispatch) is fired via workflow_dispatch from a local Task Scheduler entry.
  # The 9:30 UTC cron above is a fallback that auto-skips when the local
  # dispatch fired.
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Decide whether to run
        # Only the AM fallback cron is gated — dispatch and PM cron always run.
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHOULD_RUN=true
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "30 9 * * 1-5" ]; then
            TODAY=$(date -u +%Y-%m-%d)
            COUNT=$(gh run list \
              --workflow=update_master_prices.yml \
              --status=success \
              --event=workflow_dispatch \
              --created="$TODAY" \
              --repo "${{ github.repository }}" \
              --json databaseId --jq 'length')
            if [ "$COUNT" -gt 0 ]; then
              echo "::notice::Local AM dispatch already succeeded today ($COUNT run). Skipping fallback."
              SHOULD_RUN=false
            else
              echo "::notice::No successful AM dispatch found. Running fallback."
            fi
          fi
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

  update:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy yfinance boto3

      - name: Pull master_prices from R2
        # Bootstrapping: the very first run will skip download (parquet
        # not in R2 yet). update_master_prices.py errors out if the local
        # parquet is missing — see the bootstrap workflow for the seed run.
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python -c "from cache_io import download_to_local; download_to_local('master_prices.parquet', 'data/master_prices.parquet')"

      - name: Determine update args by trigger
        # PM cron (20:30 UTC, post-close) pulls everything yfinance has,
        # including today's close. Everything else (AM workflow_dispatch
        # from the local trigger, AM fallback cron, manual dispatch) is
        # pre-market and passes --exclude-today so yfinance's placeholder
        # bar for today is filtered out.
        id: cfg
        run: |
          if [ "${{ github.event.schedule }}" = "30 20 * * 1-5" ]; then
            echo "args=" >> "$GITHUB_OUTPUT"
          else
            echo "args=--exclude-today" >> "$GITHUB_OUTPUT"
          fi

      - name: Update master_prices (incremental yfinance pull + R2 upload)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python scripts/update_master_prices.py ${{ steps.cfg.outputs.args }}
