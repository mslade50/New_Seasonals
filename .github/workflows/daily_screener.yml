name: Daily Strategy Scan (Liquid + Overflow)

# Pre-market and post-close bookend scans only — intraday MOC slots were
# retired when the strategy book lost its last MOC entry. Add them back if
# a Signal Close strategy is reintroduced.
run-name: "Daily Strategy Scan — ${{ github.event_name == 'workflow_dispatch' && 'manual full' || 'bookend full (scope=all)' }}"

# Unified scan: each run hits LIQUID_PLUS_COMMODITIES (190 tickers) AND
# the overflow universe CSV_UNIVERSE − LIQUID_PLUS_COMMODITIES (~870
# tickers). Liquid signals -> Order_Staging tab, overflow -> Overflow tab.
# One combined email per run.
#
# Replaces both the legacy liquid-only daily_screener AND the separate
# daily_overflow workflow.

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

on:
  schedule:
    # Post-close full scan: 6:00 PM EDT (22:00 UTC). Runs 1.5h after the
    # update_master_prices job (20:30 UTC + ~3 min runtime + cron lag) so
    # the overflow tier reads a fresh master_prices.parquet that includes
    # today's close.
    - cron: '0 22 * * 1-5'
    # AM fallback: 10:30 UTC (6:30 AM EDT / 5:30 AM EST). Only runs if the
    # local workflow_dispatch at 4:47 AM ET didn't fire today (machine off,
    # network outage, etc.). The `check` job below queries this workflow's
    # recent runs and skips if a successful workflow_dispatch already
    # happened today UTC.
    - cron: '30 10 * * 1-5'

  # Pre-market full scan (4:47 AM ET weekdays) is fired via workflow_dispatch
  # from a local Task Scheduler entry on McKinley's machine — GitHub's shared
  # cron scheduler had 1-3h queue delays at 8:47 UTC. The 10:30 UTC cron
  # above is a fallback that auto-skips when the local dispatch fired.
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Decide whether to run
        # Only the AM fallback cron is gated — dispatch and PM cron always run.
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHOULD_RUN=true
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "30 10 * * 1-5" ]; then
            TODAY=$(date -u +%Y-%m-%d)
            # Only count a dispatch inside the AM pre-market window (local trigger
            # fires 4:47 AM ET = 08:47 UTC EDT / 09:47 UTC EST). Keying on the whole
            # UTC day let an evening manual dispatch (after 00:00 UTC = 8 PM EDT /
            # 7 PM EST the prior night) suppress this fallback, so no pre-market
            # scan ran and order_staging read the stale prior-evening tabs.
            COUNT=$(gh run list \
              --workflow=daily_screener.yml \
              --status=success \
              --event=workflow_dispatch \
              --created="${TODAY}T07:00Z..${TODAY}T10:30Z" \
              --repo "${{ github.repository }}" \
              --json databaseId --jq 'length')
            if [ "$COUNT" -gt 0 ]; then
              echo "::notice::Local AM dispatch already succeeded today ($COUNT run). Skipping fallback."
              SHOULD_RUN=false
            else
              echo "::notice::No successful AM dispatch found. Running fallback."
            fi
          fi
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

  run-scanner:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy yfinance gspread google-auth boto3

      - name: Pull caches from R2
        # master_prices.parquet              -> overflow scope (~870 static tickers)
        # earnings_calendar.parquet          -> OVS ±10 TD blackout (production names)
        # overflow_universe.parquet          -> comprehensive overflow list (gate ON)
        # earnings_calendar_overflow.parquet -> OVS blackout for the new overflow names
        # atr_seasonal_ranks.parquet         -> atr_sznl_filters (6 strategies gate on it;
        #                                       without it those filters match NOTHING and
        #                                       the strategies silently never fire)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python -c "from cache_io import download_to_local; download_to_local('master_prices.parquet', 'data/master_prices.parquet'); download_to_local('earnings_calendar.parquet', 'data/earnings_calendar.parquet'); download_to_local('overflow_universe.parquet', 'data/overflow_universe.parquet'); download_to_local('earnings_calendar_overflow.parquet', 'data/earnings_calendar_overflow.parquet'); download_to_local('atr_seasonal_ranks.parquet', 'atr_seasonal_ranks.parquet')"

      - name: Run Automation Script
        env:
          GCP_JSON: ${{ secrets.GCP_JSON }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          # Overflow universe gate. "1" = comprehensive (dynamic ∪ static, ~1,351);
          # "0" = legacy static tier (~870). Currently REVERTED to static — flip to
          # "1" to re-activate the comprehensive universe live (the cache pulls + R2
          # creds above stay wired, so re-enabling is a one-character change).
          OVERFLOW_UNIVERSE_ACTIVE: "0"
        run: python daily_scan.py --scope=all

      - name: Commit exposure state (AM bookend only)
        # Only the AM bookend writes data/exposure_state.json (PM bookend
        # leaves it untouched). git diff exits 0 when no change, so this is
        # a no-op on the PM run.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data/exposure_state.json ]; then
            git add data/exposure_state.json
            if git diff --cached --quiet; then
              echo "No exposure_state.json change to commit."
            else
              git commit -m "exposure: state snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
              # Race other bot commits: rebase then verify the push landed. A lost
              # push here drops the morning exposure snapshot order_staging reads.
              pushed=false
              for attempt in 1 2 3; do
                git pull --rebase origin main || true
                if git push; then pushed=true; break; fi
                echo "push attempt $attempt rejected; re-rebasing and retrying."
                sleep 5
              done
              if [ "$pushed" != true ]; then
                echo "::error::failed to push exposure_state.json after 3 attempts"
                exit 1
              fi
            fi
          fi

  deploy-site:
    # Tail of the pipeline: rebuild + deploy the private analytics site in the
    # SAME run, only after the scanner job succeeds. Replaces the old
    # best-effort workflow_run chain — deploy_site.yml is now a reusable
    # workflow. `needs: run-scanner` means a skipped (AM fallback) or failed
    # scan also skips the deploy, leaving the previous deploy up.
    needs: run-scanner
    uses: ./.github/workflows/deploy_site.yml
    secrets: inherit
