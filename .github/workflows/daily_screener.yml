name: Daily Strategy Scan

# Keeps your queue clean if GitHub lags
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    # 1. THE ORIGINALS (Early AM and Late PM)
    # 5:13 AM EDT (9:13 UTC)
    # 4:13 PM EDT (20:13 UTC)
    - cron: '13 9,20 * * 1-5'

    # 2. THE AFTERNOON BLOCKS
    # 1:40 PM EDT (17:40 UTC)
    # 2:45 PM EDT (19:00 UTC)
    - cron: '40 17 * * 1-5'
    - cron: '45 18 * * 1-5'

    # 3. THE HALF-HOUR BLOCK
    # 3:30 PM EDT (19:30 UTC)
    - cron: '30 19 * * 1-5'

  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy yfinance gspread google-auth

      - name: Run Automation Script
        env:
          GCP_JSON: ${{ secrets.GCP_JSON }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python daily_scan.py
