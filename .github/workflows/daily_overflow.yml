name: Daily Overflow Scan

# Runs daily_scan.py --scope=overflow against the ~870 overflow tickers
# (CSV_UNIVERSE - LIQUID_PLUS_COMMODITIES). Stages signals to the Overflow
# Google Sheets tab, sends the standard daily_scan email.
#
# Replaces the local Task Scheduler entry (run_overflow_scan.ps1).
# Depends on master_prices.parquet + earnings_calendar.parquet being in R2.

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    # 23:00 UTC = 7:00 PM ET — same slot as the legacy local task.
    # Runs AFTER update_master_prices (22:00 UTC) so it sees today's bars.
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy yfinance gspread google-auth boto3

      - name: Pull caches from R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python -c "from cache_io import download_to_local; download_to_local('master_prices.parquet', 'data/master_prices.parquet'); download_to_local('earnings_calendar.parquet', 'data/earnings_calendar.parquet')"

      - name: Run overflow scan
        env:
          GCP_JSON: ${{ secrets.GCP_JSON }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python daily_scan.py --scope=overflow
