# ML advisory scoring — runs after the PM scan has rewritten the staging tabs
# (daily_screener PM cron 22:00 UTC + ~10 min runtime). ADVISORY ONLY: scores
# go to data/ml/scores (artifact) + the dedicated ML_Scores Sheets tab; no
# existing tab or pipeline consumes them. Model artifact is pulled from R2
# (uploaded by `python -m ml.train`). Fail-safe: ml.score_daily always exits 0.
# Activated 2026-06-10 (was workflow_dispatch-only at first build).
name: ML Advisory Score

on:
  schedule:
    - cron: "25 22 * * 1-5"
  workflow_dispatch:

permissions:
  actions: read

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for today's PM screener to finish staging
        # The 22:00 UTC daily_screener PM run clears+rewrites Order_Staging/Overflow.
        # Score only AFTER a screener run has SUCCEEDED inside today's PM window, else
        # we'd read yesterday's rows (or catch the clear-rewrite window and score an
        # empty tab). GHA cron queue lag (1-3h in this repo) can push the screener
        # late, so poll up to ~50 min, then fail loudly instead of scoring stale tabs.
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          for attempt in $(seq 1 11); do
            COUNT=$(gh run list \
              --workflow=daily_screener.yml \
              --status=success \
              --created="${TODAY}T21:55Z..${TODAY}T23:59Z" \
              --repo "${{ github.repository }}" \
              --json databaseId --jq 'length')
            if [ "$COUNT" -gt 0 ]; then
              echo "PM screener run found for $TODAY ($COUNT). Proceeding."
              exit 0
            fi
            echo "No successful PM screener run yet for $TODAY (attempt $attempt/11); waiting 5 min."
            sleep 300
          done
          echo "::error::PM daily_screener has not completed for $TODAY; refusing to score stale tabs."
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull caches from R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          python -c "from cache_io import download_to_local; \
            download_to_local('master_prices.parquet', 'data/master_prices.parquet'); \
            download_to_local('atr_seasonal_ranks.parquet', 'atr_seasonal_ranks.parquet'); \
            download_to_local('rd2_fragility.parquet', 'data/rd2_fragility.parquet')"

      - name: Score staged signals (advisory, fail-safe)
        env:
          GCP_JSON: ${{ secrets.GCP_JSON }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python -m ml.score_daily --source sheets --sheets-out

      - name: Surface scoring failures
        # ml.score_daily is fail-safe (always exits 0) and its exception path never
        # rewrites the ML_Scores tab, so a scoring error silently leaves yesterday's
        # SKIP/TRIM rows live against today's book. Turn the run red when the score
        # file degraded to the model_unavailable pass-through so it is not dismissed.
        run: |
          latest=$(ls -1t data/ml/scores/ml_scores_*.csv 2>/dev/null | head -n1)
          if [ -z "$latest" ]; then
            echo "::error::no ml score file was produced"
            exit 1
          fi
          if grep -q "model_unavailable" "$latest"; then
            echo "::error::scoring degraded to pass-through (model_unavailable); ML_Scores tab may be stale"
            exit 1
          fi
          echo "scores OK: $latest"

      - name: Upload scores artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-scores
          path: data/ml/scores/
          if-no-files-found: warn
