name: Daily PM Briefing

on:
  schedule:
    # Run at 10:35 PM UTC (5:35 PM ET), weekdays — 20 min after risk report
    # Note: runs its own risk report step since Actions VMs don't share state
    - cron: '35 22 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  pm_briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install kaleido

      - name: Run risk report first (populates cache)
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python daily_risk_report.py

      - name: Run PM briefing
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python daily_pm_briefing.py
