name: Update CBOE Put/Call Cache

# Scrapes any missing trading days from cboe.com/us/options/market_statistics/daily
# into data/cboe_putcall.parquet and commits the updated parquet back to main.
# Powers the bottom panel of the SPX Breadth page (pages/spx_breadth.py).
#
# The backfill in cboe_putcall.py is incremental — it only fetches dates not
# already in the cache, so steady-state cost is ~1 request per weekday.

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

on:
  schedule:
    # 21:30 UTC = 5:30 PM ET — after close, alongside earnings + portfolio jobs.
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas pyarrow

      - name: Backfill missing days
        run: python -m cboe_putcall --start 2024-01-01

      - name: Commit + push updated parquet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cboe_putcall.parquet
          if git diff --cached --quiet; then
            echo "No CBOE put/call change to commit."
          else
            git commit -m "data: CBOE put/call refresh $(date -u +'%Y-%m-%d')"
            # Rebase, verify the push landed, and fail loudly if it did not so a
            # lost push (racing the other 21:30 UTC bot commits) is visible rather
            # than silently swallowed by `|| true`.
            pushed=false
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              if git push; then pushed=true; break; fi
              echo "push attempt $attempt rejected; re-rebasing and retrying."
              sleep 5
            done
            if [ "$pushed" != true ]; then
              echo "::error::failed to push cboe_putcall.parquet after 3 attempts"
              exit 1
            fi
          fi
