name: Bootstrap Caches (one-shot)

# One-time seed run — builds master_prices.parquet from scratch in GHA
# and uploads to R2. Use this when you don't want to wait for the
# nightly local build to push the first copy.
#
# This is workflow_dispatch ONLY — never auto-runs. Triggering it does:
#   1. Pull full ~25-yr OHLCV history for ~2000 tickers from yfinance
#   2. Write data/master_prices.parquet (~50-200 MB, takes ~10-15 min)
#   3. Upload to r2://${R2_BUCKET}/master_prices.parquet
#
# After this completes successfully, all the daily workflows
# (update_master_prices, daily_overflow, portfolio_report) can run
# without needing your local machine.

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date for the price history (YYYY-MM-DD)'
        required: false
        default: '2000-01-01'

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy yfinance boto3

      - name: Build master_prices from scratch + upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python scripts/build_master_prices.py --start ${{ inputs.start_date }}
